name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/database/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: capvistaregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -f apps/api/Dockerfile -t capvistaregistry.azurecr.io/capvista-api:${{ github.sha }} -t capvistaregistry.azurecr.io/capvista-api:latest .
          docker push capvistaregistry.azurecr.io/capvista-api:${{ github.sha }}
          docker push capvistaregistry.azurecr.io/capvista-api:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: capvista-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          images: capvistaregistry.azurecr.io/capvista-api:${{ github.sha }}
