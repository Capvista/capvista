name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/database/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: capvistaregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -f apps/admin/Dockerfile \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=https://capvista-api.azurewebsites.net \
            --build-arg NEXT_PUBLIC_ADMIN_INVITE_CODE=${{ secrets.NEXT_PUBLIC_ADMIN_INVITE_CODE }} \
            -t capvistaregistry.azurecr.io/capvista-admin:${{ github.sha }} \
            -t capvistaregistry.azurecr.io/capvista-admin:latest .
          docker push capvistaregistry.azurecr.io/capvista-admin:${{ github.sha }}
          docker push capvistaregistry.azurecr.io/capvista-admin:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: capvista-admin
          publish-profile: ${{ secrets.AZURE_ADMIN_PUBLISH_PROFILE }}
          images: capvistaregistry.azurecr.io/capvista-admin:${{ github.sha }}
